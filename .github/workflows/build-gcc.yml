name: Build GCC template site

on:
  workflow_dispatch:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'build-gcc/**'
      - 'src/_includes/gcc/**'
      - 'src/assets/gcc/**'
      - 'src/_data/**'
      - '.eleventy.js'
      - 'scripts/stage-build-gcc.js'

concurrency:
  group: gcc-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build GCC site
        run: npm run build:gcc
        env:
          PATHPREFIX: /${{ github.event.repository.name }}/

      - name: Commit _site-gcc back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _site-gcc/
          git diff --cached --quiet || git commit -m "Build _site-gcc from ${GITHUB_SHA::7}"
          git push origin main
